<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Hello</title>
</head>
<body>
	<h1>名前を入力してください</h1>
	<form th:action="@{/hello}" th:object="${helloForm}" method="post">
		<input type="text" th:field="*{name}" placeholder="名前を入力">
		<span th:if="${#fields.hasErrors('name')}" 
			th:errors="*{name}" style="color:red">
		</span>
		<button type="submit">送信</button>
	</form>
</body>
</html>
